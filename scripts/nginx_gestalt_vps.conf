server {
    listen 80;
    server_name gestalt.cl www.gestalt.cl;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name gestalt.cl www.gestalt.cl;
    ssl_certificate /etc/letsencrypt/live/gestalt.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestalt.cl/privkey.pem;
    gzip on; gzip_types application/json text/css application/javascript;
    location /static/ { alias /home/ubuntu/depafix/static/; expires 1h; }
    location / { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_connect_timeout 30s; proxy_read_timeout 120s; }
}
