<!DOCTYPE html>
<html>
<head><title>Procurador Virtual</title></head>
<body>
    <h1>🛡️ Procurador Virtual</h1>
    <div>
        <h2>Cliente</h2>
        <input id="clienteId" size="40" placeholder="cliente_id (uuid)">
    </div>
    <div>
        <h2>Saldo de Tokens</h2>
        <p id="saldo">Cargando...</p>
        <button onclick="cargarSaldo()">Actualizar saldo</button>
        <button onclick="comprarTokens()">Comprar 10 tokens</button>
    </div>
    <div>
        <h2>Consultar</h2>
        <textarea id="consulta" rows="4" cols="50">¿Procede prescripción de deuda del 2014?</textarea>
        <button onclick="consultar()">Enviar</button>
        <pre id="respuesta"></pre>
    </div>
    <script>
        function clienteId() {
            return document.getElementById('clienteId').value.trim();
        }
        async function cargarSaldo() {
            const id = clienteId();
            if (!id) { document.getElementById('saldo').textContent = '(ingresa cliente_id)'; return; }
            const res = await fetch('/api/tokens/saldo?cliente_id=' + encodeURIComponent(id));
            const data = await res.json();
            document.getElementById('saldo').textContent = data.tokens ?? data.error ?? 0;
        }
        async function comprarTokens() {
            const id = clienteId();
            if (!id) { alert('Ingresa cliente_id'); return; }
            await fetch('/api/comprar_tokens', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cliente_id: id, cantidad: 10})});
            cargarSaldo();
        }
        async function consultar() {
            const consulta = document.getElementById('consulta').value;
            const id = clienteId();
            const body = id ? {consulta, cliente_id: id} : {consulta};
            const res = await fetch('/api/procurador/consultar', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
            const data = await res.json();
            document.getElementById('respuesta').textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
