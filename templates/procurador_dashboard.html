<!DOCTYPE html>
<html>
<head><title>Procurador Virtual</title></head>
<body>
    <h1>🛡️ Procurador Virtual</h1>
    <div>
        <h2>Saldo de Tokens</h2>
        <p id="saldo">Cargando...</p>
        <button onclick="comprarTokens()">Comprar 10 tokens</button>
    </div>
    <div>
        <h2>Consultar</h2>
        <textarea id="consulta" rows="4" cols="50">¿Procede prescripción de deuda del 2014?</textarea>
        <button onclick="consultar()">Enviar</button>
        <pre id="respuesta"></pre>
    </div>
    <script>
        async function cargarSaldo() {
            const res = await fetch('/api/tokens/saldo?usuario_id=1');
            const data = await res.json();
            document.getElementById('saldo').textContent = data.saldo || 0;
        }
        async function comprarTokens() {
            await fetch('/api/tokens/comprar', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({usuario_id: 1, cantidad: 10})});
            cargarSaldo();
        }
        async function consultar() {
            const consulta = document.getElementById('consulta').value;
            const res = await fetch('/api/procurador/consultar', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({consulta, usuario_id: 1})});
            const data = await res.json();
            document.getElementById('respuesta').textContent = data.respuesta || data.error || 'Sin respuesta';
        }
        cargarSaldo();
    </script>
</body>
</html>
