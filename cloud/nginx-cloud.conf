server {
    listen 80;
    server_name _;

    location /api/aquiles/ {
        proxy_pass http://aquiles:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/siegfried/ {
        proxy_pass http://siegfried:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/sancho/ {
        proxy_pass http://sancho:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/hermes/ {
        proxy_pass http://hermes:8004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bilardo/ {
        proxy_pass http://bilardo:8005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        return 200 '{"status":"OK","services":["aquiles","siegfried","sancho","hermes","bilardo"]}';
        add_header Content-Type application/json;
    }
}
