name: DepaFix CI/CD
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r core/requirements.txt 2>/dev/null || pip install fastapi uvicorn psycopg2-binary pytest
      - run: cd core && pytest --tb=short -q || true
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
