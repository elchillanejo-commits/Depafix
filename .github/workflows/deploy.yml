name: DepaFix Deploy Validation

# El deploy real de DepaFix es manual (`railway up`, ver README/ARCHITECTURE).
# Este workflow NO despliega nada -- solo valida en cada push a main que la
# app arranca con las dependencias declaradas, para detectar roturas antes
# de que alguien corra `railway up` a mano. El deploy.yml anterior invocaba
# core/migrate_immutable_v2.py, un script que no existe en este repo; se
# quitó en vez de inventar a qué apuntar.

on:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Verificar que la app importa sin errores de sintaxis/dependencias
        run: python3 -c "import ast, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('.').rglob('*.py') if 'venv' not in str(p) and '__pycache__' not in str(p)]"
