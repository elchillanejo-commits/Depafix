name: DepaFix CI/CD
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: depafix
          POSTGRES_USER: depafix
          POSTGRES_PASSWORD: sGXizxWs4khbF8ZJeOJ
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install fastapi uvicorn psycopg2-binary pytest httpx sqlalchemy
      - run: cd core && python3 -m pytest test_api.py test_dashboard.py -q
        env:
          PGPASSWORD: sGXizxWs4khbF8ZJeOJ
