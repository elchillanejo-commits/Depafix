name: DepaFix Scraper Sodimac
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install playwright requests && playwright install chromium --with-deps

      - name: Run scraper
        run: python3 scraper_actions.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: precios-${{ github.run_number }}
          path: precios_hoy.json
