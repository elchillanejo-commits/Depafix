version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: depafix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Falta POSTGRES_PASSWORD en el entorno/.env (credencial hardcodeada removida, auditoria 2026-07-16 -- repo publico)}
      POSTGRES_DB: depafix
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depafix"]
      interval: 10s

  flask:
    build: { context: ., dockerfile: docker/Dockerfile.flask }
    ports: ["5000:5000"]
    depends_on: [postgres]
    restart: always

  fastapi:
    build: { context: ., dockerfile: docker/Dockerfile.fastapi }
    ports: ["8000:8000"]
    environment:
      DB_HOST: postgres
      DB_USER: depafix
      DB_PASS: ${POSTGRES_PASSWORD:?Falta POSTGRES_PASSWORD en el entorno/.env (credencial hardcodeada removida, auditoria 2026-07-16 -- repo publico)}
      DB_NAME: depafix
    depends_on: [postgres]
    restart: always

  frontend:
    build: { context: ., dockerfile: docker/Dockerfile.frontend }
    ports: ["80:80"]
    depends_on: [fastapi, flask]
    restart: always

volumes:
  pgdata:
